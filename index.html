<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Travel Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 90vh; }
    #panel { padding: 10px; background: #f5f5f5; }
    input, select, button { margin: 5px; }
  </style>
</head>
<body>

<div id="panel">
  <strong>Стран: <span id="countryCount">0</span></strong><br>

  <input id="country" placeholder="Страна">
  <input id="city" placeholder="Город">
  <input type="date" id="date">
  <input type="number" id="visits" value="1" min="1">

  <select id="color">
    <option value="red">Красный</option>
    <option value="blue">Синий</option>
    <option value="green">Зелёный</option>
  </select>

  <button onclick="clearData()">🗑 Очистить</button>
</div>

<div id="map"></div>

<script>
// карта
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// данные
let places = JSON.parse(localStorage.getItem('places') || '[]');

// обновление счётчика стран
function updateCounter() {
  const countries = new Set(
    places.map(p => p.country.trim().toLowerCase())
  );
  document.getElementById('countryCount').innerText = countries.size;
}

// добавить точку
function addMarker(place) {
  L.circleMarker([place.lat, place.lng], {
    color: place.color,
    radius: 8
  })
  .addTo(map)
  .bindPopup(`<b>${place.city}</b><br>${place.country}`);
}

// загрузка
places.forEach(addMarker);
updateCounter();

// клик по карте
map.on('click', function(e) {
  const country = document.getElementById('country').value.trim();
  const city = document.getElementById('city').value.trim();
  const date = document.getElementById('date').value;
  const visits = document.getElementById('visits').value;
  const color = document.getElementById('color').value;

  if (!country || !city) {
    alert('Введите страну и город');
    return;
  }

  const place = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    country,
    city,
    date,
    visits,
    color
  };

  places.push(place);
  addMarker(place);
  updateCounter();

  localStorage.setItem('places', JSON.stringify(places));
});

// очистка
function clearData() {
  if (!confirm('Удалить всё?')) return;
  localStorage.removeItem('places');
  location.reload();
}
</script>

</body>
</html>
