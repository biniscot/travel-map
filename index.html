<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Travel Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 90vh; }
    #panel { padding: 10px; background: #f5f5f5; }
    input, select, button { margin: 5px; }
  </style>
</head>
<body>

<div id="panel">
  <strong>Стран: <span id="countryCount">0</span></strong><br>

  <input id="country" placeholder="Страна">
  <input id="city" placeholder="Город">
  <input type="date" id="date">
  <input type="number" id="visits" value="1" min="1">

  <select id="color">
    <option value="red">Красный</option>
    <option value="blue">Синий</option>
    <option value="green">Зелёный</option>
  </select>

  <button onclick="saveData()">💾 Сохранить</button>
  <button onclick="exportData()">📥 Экспорт</button>
  <button onclick="importData()">📤 Импорт</button>
  <button onclick="clearData()">🗑 Очистить</button>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = [];
let places = JSON.parse(localStorage.getItem('places') || '[]');

const countryInput = document.getElementById('country');
const cityInput = document.getElementById('city');
const dateInput = document.getElementById('date');
const visitsInput = document.getElementById('visits');
const color = document.getElementById('color');

function updateCounter() {
  const countries = new Set(places.map(p => p.country));
  document.getElementById('countryCount').innerText = countries.size;
}

function addMarker(place) {
  const marker = L.circleMarker([place.lat, place.lng], {
    color: place.color,
    radius: 8
  }).addTo(map);

  marker.bindPopup(`<b>${place.city}</b><br>${place.country}<br>${place.date || ''}`);
  markers.push(marker);
}

function loadPlaces() {
  places.forEach(addMarker);
  updateCounter();
}

map.on('click', function(e) {
  const country = countryInput.value;
  const city = cityInput.value;

  if (!country || !city) return alert('Введите данные');

  const place = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    country,
    city,
    date: dateInput.value,
    visits: visitsInput.value,
    color: color.value
  };

  places.push(place);
  addMarker(place);
  updateCounter();
});

function saveData() {
  localStorage.setItem('places', JSON.stringify(places));
  alert('Сохранено');
}

function clearData() {
  if (!confirm('Удалить всё?')) return;
  localStorage.removeItem('places');
  location.reload();
}

function exportData() {
  const blob = new Blob([JSON.stringify(places)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'map.json';
  a.click();
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = () => {
      places = JSON.parse(reader.result);
      localStorage.setItem('places', JSON.stringify(places));
      location.reload();
    };
    reader.readAsText(file);
  };
  input.click();
}

loadPlaces();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
