```html
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Travel Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 90vh; }
    #panel { padding: 10px; background: #f5f5f5; }
    input, select, button { margin: 5px; }
  </style>
</head>
<body>

<div id="panel">
  <strong>Стран: <span id="countryCount">0</span></strong><br>

  <input id="country" placeholder="Страна">
  <input id="city" placeholder="Город">
  <input type="date" id="date">
  <input type="number" id="visits" value="1" min="1">

  <select id="color">
    <option value="red">Красный</option>
    <option value="blue">Синий</option>
    <option value="green">Зелёный</option>
  </select>

  <button onclick="saveData()">💾 Сохранить</button>
  <button onclick="exportData()">📥 Экспорт</button>
  <button onclick="importData()">📤 Импорт</button>
  <button onclick="clearData()">🗑 Очистить</button>
</div>

<div id="map"></div>

<script>
// ✅ Инициализация карты
const map = L.map('map').setView([20, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ✅ Данные
let markers = [];
let places = JSON.parse(localStorage.getItem('places') || '[]');

// ✅ ПЕРЕМЕННЫЕ (важно!)
const countryInput = document.getElementById('country');
const cityInput = document.getElementById('city');
const dateInput = document.getElementById('date');
const visitsInput = document.getElementById('visits');
const color = document.getElementById('color');

// ✅ Счётчик стран (без дублей)
function updateCounter() {
  const countries = new Set(
    places.map(p => p.country.trim().toLowerCase())
  );
  document.getElementById('countryCount').innerText = countries.size;
}

// ✅ Добавление маркера
function addMarker(place) {
  const marker = L.circleMarker([place.lat, place.lng], {
    color: place.color,
    radius: 8
  }).addTo(map);

  marker.bindPopup(
    `<b>${place.city}</b><br>${place.country}<br>${place.date || ''}`
  );

  markers.push(marker);
}

// ✅ Загрузка данных
function loadPlaces() {
  places.forEach(addMarker);
  updateCounter();
}

// ✅ КЛИК ПО КАРТЕ (теперь работает!)
map.on('click', function(e) {
  const country = countryInput.value.trim();
  const city = cityInput.value.trim();

  if (!country || !city) {
    alert('Введите страну и город');
    return;
  }

  // ❌ защита от дублей
  const exists = places.some(p =>
    p.city.toLowerCase() === city.toLowerCase() &&
    p.country.toLowerCase() === country.toLowerCase()
  );

  if (exists) {
    alert("Это место уже добавлено");
    return;
  }

  const place = {
    lat: e.latlng.lat,
    lng: e.latlng.lng,
    country,
    city,
    date: dateInput.value,
    visits: visitsInput.value,
    color: color.value
  };

  places.push(place);
  addMarker(place);
  updateCounter();
});

// 💾 Сохранение
function saveData() {
  localStorage.setItem('places', JSON.stringify(places));
  alert('Сохранено');
}

// 🗑 Очистка
function clearData() {
  if (!confirm('Удалить всё?')) return;
  localStorage.removeItem('places');
  location.reload();
}

// 📥 Экспорт
function exportData() {
  const blob = new Blob([JSON.stringify(places)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'map.json';
  a.click();
}

// 📤 Импорт
function importData() {
  const input = document.createElement('input');
  input.type = 'file';

  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = () => {
      places = JSON.parse(reader.result);
      localStorage.setItem('places', JSON.stringify(places));
      location.reload();
    };

    reader.readAsText(file);
  };

  input.click();
}

// 🚀 Запуск
loadPlaces();

// 📱 PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
